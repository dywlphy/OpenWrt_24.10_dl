name: Download OpenWrt 24.10 DL Cache

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  dl_download:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout workspace files
      uses: actions/checkout@main

    - name: Install compile dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 python3-setuptools rsync swig unzip zlib1g-dev file wget xsltproc libelf-dev libjson-c-dev liblzo2-dev liblzma-dev libzstd-dev quilt u-boot-tools python3-dev python3-pyelftools python3-yaml curl aria2 subversion libdbus-1-dev libexpat1-dev libglib2.0-dev
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone OpenWrt source
      working-directory: /workdir
      run: |
        git clone -b ${{ env.REPO_BRANCH }} --single-branch --depth 1 ${{ env.REPO_URL }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Cache dl directory
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        key: openwrt-24.10-local-dl-${{ hashFiles('24.10_diy-part1.sh','24.10_diy-part2.sh','24.10_config.txt') }}
        restore-keys: |
          openwrt-24.10-local-dl-

    - name: Load custom feeds source
      run: |
        chmod +x 24.10_diy-part1.sh
        cd openwrt
        $GITHUB_WORKSPACE/24.10_diy-part1.sh

    - name: Update & install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        ./scripts/feeds uninstall -p passwall_packages geoview 2>/dev/null || true

    - name: Import config and second diy script
      run: |
        [ -e 24.10_config.txt ] && cp 24.10_config.txt openwrt/.config
        chmod +x 24.10_diy-part2.sh
        cd openwrt
        $GITHUB_WORKSPACE/24.10_diy-part2.sh

    - name: Config tune & full dependency download(j4 fixed)
      run: |
        cd openwrt
        # 海外优先Go代理，适配GitHub云编译
        export GO111MODULE=on
        export GOPROXY=https://proxy.golang.org,https://goproxy.cn,direct

        make defconfig
        sed -i 's/CONFIG_PACKAGE_geoview=[ym]/# CONFIG_PACKAGE_geoview is not set/' .config
        sed -i 's/CONFIG_PACKAGE_dnsmasq=[ym]/# CONFIG_PACKAGE_dnsmasq is not set/' .config
        sed -i 's/CONFIG_PACKAGE_kmod-fullconenat=[ym]/# CONFIG_PACKAGE_kmod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_iptables-mod-fullconenat=[ym]/# CONFIG_PACKAGE_iptables-mod-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-fullconenat=[ym]/# CONFIG_PACKAGE_luci-app-fullconenat is not set/' .config
        sed -i 's/CONFIG_PACKAGE_kmod-ipt-nat6=[ym]/# CONFIG_PACKAGE_kmod-ipt-nat6 is not set/' .config
        sed -i 's/CONFIG_PACKAGE_v2ray-plugin=[ym]/# CONFIG_PACKAGE_v2ray-plugin is not set/' .config
        sed -i 's/CONFIG_PACKAGE_luci-app-passwall2_INCLUDE_V2ray_Plugin=[ym]/# CONFIG_PACKAGE_luci-app-passwall2_INCLUDE_V2ray_Plugin is not set/' .config
        make defconfig

        make prereq

        make download -j4 V=s
        make target/download -j4
        make package/download -j4

        for retry in {1..3}; do
          echo "Dependency retry round $retry"
          if make download -j4; then
            echo "Dependency download complete"
            break
          fi
          sleep 30
        done

        find dl -type f -size -1024c -delete
        find dl -name "*.part" -delete
        find dl -name "*.tmp" -delete

        echo "DL file count: $(ls dl | wc -l)"
        echo "DL total size: $(du -sh dl)"

    - name: Export full dl cache artifact
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-24.10-full-dl-cache
        path: openwrt/dl
        retention-days: 14

    - name: Download finish tip
      run: |
        echo "====================================="
        echo "✅ 云侧全量依赖下载完毕"
        echo "下载包可直接替换本地 /root/openwrt-dl-cache"
        echo "====================================="
